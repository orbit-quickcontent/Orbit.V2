# ORBIT Flutter Native Splash Configuration
# Run: dart run flutter_native_splash:create
# This generates the native Android/iOS splash screens.

flutter_native_splash:
  # Solid black background — matches web app
  color: "#000000"
  color_dark: "#000000"

  image: assets/splash/orbit_splash.png
  image_dark: assets/splash/orbit_splash.png

  # Android 12+ splash settings
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/splash/orbit_splash.png

  # Keep fullscreen during splash
  fullscreen: true

  # Android specific
  android: true
  ios: true
  web: false
