name: orbit_client
description: "ORBIT Client — Production Flutter WebView wrapper for the Orbit client web app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Core WebView (production-grade) ──────────────────────────────────────────
  flutter_inappwebview: ^6.1.5

  # ── Permissions ──────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── GPS / Location ───────────────────────────────────────────────────────────
  geolocator: ^12.0.0

  # ── Connectivity ─────────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.3

  # ── File / Camera ────────────────────────────────────────────────────────────
  file_picker: ^8.1.7
  image_picker: ^1.1.2

  # ── Biometrics ───────────────────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Share ────────────────────────────────────────────────────────────────────
  share_plus: ^10.1.4

  # ── URL Launcher ─────────────────────────────────────────────────────────────
  url_launcher: ^6.3.1

  # ── Persistence ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.5

  # ── Splash / SystemUI ────────────────────────────────────────────────────────
  flutter_native_splash: ^2.4.3

  # ── Package Info ─────────────────────────────────────────────────────────────
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/icon/
