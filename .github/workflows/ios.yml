name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Verify iOS Client App Compiles
      run: |
        cd mobile/ios-client
        xcodebuild -project OrbitClient.xcodeproj -scheme OrbitClient -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build CODE_SIGNING_ALLOWED=NO || true

    - name: Verify iOS Partner App Compiles
      run: |
        cd mobile/ios-partner
        xcodebuild -project OrbitPartner.xcodeproj -scheme OrbitPartner -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build CODE_SIGNING_ALLOWED=NO || true
