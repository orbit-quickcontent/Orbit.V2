name: Orbit Platform CI / CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Dependencies
        run: |
          cd orbit-marketplace/backend
          npm ci || npm install
      - name: Run Backend Linter & Typecheck
        run: |
          cd orbit-marketplace/backend
          npx tsc --noEmit

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security Audit
        run: |
          cd orbit-marketplace/backend
          npm audit --audit-level=high || true

  android-build:
    name: Build Android Native Apps (Client & Partner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          cd mobile/android-client
          gradle wrapper || true
          cd ../android-partner
          gradle wrapper || true

      - name: Build Android Client APK
        run: |
          cd mobile/android-client
          gradle assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: Upload Android Client APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-client-apk
          path: mobile/android-client/app/build/outputs/apk/debug/*.apk

      - name: Build Android Partner APK
        run: |
          cd mobile/android-partner
          gradle assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: Upload Android Partner APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-partner-apk
          path: mobile/android-partner/app/build/outputs/apk/debug/*.apk
