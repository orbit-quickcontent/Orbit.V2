name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Wrapper Version
      run: |
        cd mobile/android-client
        gradle wrapper --gradle-version 8.5
        cd ../android-partner
        gradle wrapper --gradle-version 8.5

    - name: Build Android Client APK
      run: |
        cd mobile/android-client
        ./gradlew assembleDebug --no-daemon

    - name: Build Android Partner APK
      run: |
        cd mobile/android-partner
        ./gradlew assembleDebug --no-daemon
