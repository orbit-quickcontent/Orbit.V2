name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Wrapper
      run: |
        cd mobile/android-client
        gradle wrapper || true
        cd ../android-partner
        gradle wrapper || true

    - name: Build Android Client APK
      run: |
        cd mobile/android-client
        gradle assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon

    - name: Build Android Partner APK
      run: |
        cd mobile/android-partner
        gradle assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon
